<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autentico — World Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF7F2;--terra:#C4614A;--terra2:#9E4A36;--gold:#C9A84C;
  --text:#1A1A1A;--muted:#7A7570;--border:#E5E0D8;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;
  --radius-card:20px;--shadow-card:0 4px 24px rgba(0,0,0,.08);
  --transition:.22s cubic-bezier(.4,0,.2,1)
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(250,247,242,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 1px 0 var(--border);max-width:100vw;box-sizing:border-box}
.logo{font-family:var(--serif);font-size:22px;font-weight:600;text-decoration:none;color:var(--text)}
.logo span{color:var(--terra)}
.hdr-right{display:flex;align-items:center;gap:12px}
/* search moved to section – no header search-wrap */
.btn-add-hdr{background:var(--terra);color:#fff;border:none;border-radius:24px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all var(--transition);box-shadow:0 3px 12px rgba(196,97,74,.35);letter-spacing:.2px}
.btn-add-txt{font-size:inherit}
.btn-add-hdr:hover{background:var(--terra2);transform:translateY(-1px);box-shadow:0 5px 18px rgba(196,97,74,.45)}
.btn-add-hdr:active{transform:translateY(0);box-shadow:0 2px 8px rgba(196,97,74,.3)}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:60px 80px;gap:60px;position:relative;max-width:100vw;box-sizing:border-box}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(196,97,74,.07),transparent 70%);pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(196,97,74,.1);color:var(--terra);border-radius:20px;padding:6px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:24px;border:1px solid rgba(196,97,74,.2)}
.hero h1{font-family:var(--serif);font-size:clamp(40px,5vw,68px);font-weight:600;line-height:1.05;letter-spacing:-1.5px;margin-bottom:20px}
.hero h1 em{font-style:italic;color:var(--terra)}
.hero p{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:32px;max-width:400px}
.hero-btns{display:flex;gap:14px;align-items:center}
.btn-primary{background:var(--terra);color:#fff;border:none;border-radius:30px;padding:15px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);text-decoration:none;transition:all var(--transition);box-shadow:0 6px 24px rgba(196,97,74,.4);letter-spacing:.2px}
.btn-primary:hover{background:var(--terra2);transform:translateY(-2px);box-shadow:0 10px 32px rgba(196,97,74,.5)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{color:var(--text);font-size:15px;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.btn-ghost:hover{color:var(--terra)}
.hero-stats{display:flex;gap:24px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.stat-n{font-family:var(--serif);font-size:28px;font-weight:600}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.hero-imgs{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;height:520px}
.h-img{border-radius:22px;overflow:hidden;position:relative;cursor:pointer}
.h-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--transition)}
.h-img:hover img{transform:scale(1.07)}
.h-img:first-child{grid-row:span 2}
.h-img-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.3) 50%,transparent 100%);padding:18px 16px 14px;color:#fff;transition:opacity .3s}
.h-img-ov strong{font-family:var(--serif);font-size:16px;display:block;margin-bottom:2px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.h-img-ov small{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:1.2px}

/* FILTERS */
.section{padding:48px 80px}
.section-title{font-family:var(--serif);font-size:32px;margin-bottom:22px;letter-spacing:-.5px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.f-btn{border:1.5px solid var(--border);border-radius:24px;padding:8px 20px;font-size:13px;font-weight:500;background:#fff;cursor:pointer;font-family:var(--sans);transition:all var(--transition);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.f-btn:hover{border-color:var(--terra);color:var(--terra);background:rgba(196,97,74,.04)}
.f-btn:active{transform:scale(.97)}
.f-btn.active{background:var(--text);color:#fff;border-color:var(--text);box-shadow:0 3px 12px rgba(26,25,23,.25)}

/* RECIPE GRID */
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.no-results{grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--muted);font-size:16px;line-height:1.6}
.no-results::before{content:'🍽️';display:block;font-size:48px;margin-bottom:16px}
.rcard{background:#fff;border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-card);cursor:pointer;transition:transform var(--transition),box-shadow var(--transition);display:block;text-decoration:none;color:inherit;border:1px solid rgba(0,0,0,.04)}
.rcard:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,.14)}
.rcard:active{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.rcard-img{position:relative;height:220px;overflow:hidden;background:linear-gradient(135deg,#f0ebe3,#e8e0d5)}
.rcard-img img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .6s var(--transition)}
.rcard:hover .rcard-img img{transform:scale(1.08)}
.rcard-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px}
.badge{border-radius:20px;padding:5px 11px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-v{background:linear-gradient(135deg,#C9A84C,#e8c76a);color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.badge-t{background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15)}
.rcard-body{padding:18px 20px 20px}
.rcard-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--terra),var(--terra2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(196,97,74,.35)}
.rcard-author{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.rcard-an{font-size:13px;font-weight:600}
.rcard-ar{font-size:11px;color:var(--muted);margin-top:1px}
.rcard-title{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:6px;line-height:1.15;letter-spacing:-.3px}
.rcard-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;max-width:100vw;box-sizing:border-box}
.rcard-footer{display:flex;align-items:center;justify-content:space-between}
.rcard-likes{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);transition:color .2s;min-width:40px;min-height:24px}
.rcard-likes.liked{color:var(--terra);font-weight:600}
.rcard-likes svg{color:var(--terra);transition:color .2s,font-size .2s;flex-shrink:0}
@keyframes likePopSafe{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(0.95)}100%{transform:scale(1)}}
.rcard-likes.liked svg{animation:likePopSafe .35s ease forwards}
.btn-cook{background:var(--terra);color:#fff;border:none;border-radius:22px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all var(--transition);letter-spacing:.2px}
.btn-cook:hover{background:var(--terra2);transform:scale(1.05)}
.btn-cook:active{transform:scale(.97)}

/* DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;overflow-y:auto;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.overlay.open{display:flex;justify-content:center;padding:40px 20px;align-items:flex-start}
.modal{background:var(--bg);width:100%;
